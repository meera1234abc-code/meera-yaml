#this is workflow name
name: hello workflow

#runs on a trigger
on:
  push:
    branches: [main]

#these are jobs inside workflow
jobs:
  #this is the name of job
  greet:
    #this is github runner,each job runs in a runner
    runs-on: ubuntu-latest
    steps:
      - name: Say hello to users
        run: echo "hello Frendwa"
      - name: Say hello to username
        run: echo "hello $USER"
